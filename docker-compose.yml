services:
  db:
    image: postgres:16
    container_name: apifinancas-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: apifinancas-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/postgres
      DB_USER: postgres
      DB_PASS: 123456
      JWT_SECRET: ${JWT_SECRET:-troque-este-secret-em-producao}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
